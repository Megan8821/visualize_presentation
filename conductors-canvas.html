<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Conductor's Canvas</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#000; overflow:hidden; font-family:'Helvetica Neue',Arial,sans-serif; color:#e8e8ee; }
  #app { display:flex; flex-direction:column; height:100vh; height:100dvh; }
  #bar { display:flex; flex-wrap:wrap; align-items:center; gap:12px; padding:10px 16px;
    background:rgba(14,14,20,0.82); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.07); z-index:10; }
  #title { font-weight:800; font-size:14px; letter-spacing:4px; text-transform:uppercase;
    background:linear-gradient(90deg,#ffb327,#1fc7d6,#ff5fa2,#9d6bff);
    -webkit-background-clip:text; background-clip:text; color:transparent; margin-right:4px; white-space:nowrap; }
  .group { display:flex; align-items:center; gap:6px; }
  .lbl { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; opacity:0.4; margin-right:2px; }
  .fam { border:1px solid rgba(255,255,255,0.14); background:rgba(255,255,255,0.02); color:#cfcfd8;
    padding:7px 12px; border-radius:20px; cursor:pointer; font-size:11px; letter-spacing:1px;
    text-transform:uppercase; transition:all .18s; white-space:nowrap; }
  .fam:hover { border-color:rgba(255,255,255,0.4); }
  .fam.active { color:#0a0a10; font-weight:700; border-color:transparent; }
  select, button.ctrl { background:rgba(255,255,255,0.04); color:#e8e8ee; border:1px solid rgba(255,255,255,0.14);
    border-radius:8px; padding:6px 10px; font-size:12px; cursor:pointer; outline:none; }
  select:hover, button.ctrl:hover { border-color:rgba(255,255,255,0.4); }
  button.ctrl.on { background:#1fc7d6; color:#0a0a10; border-color:transparent; font-weight:700; }
  button.ctrl.demo { background:#9d6bff; color:#0a0a10; border-color:transparent; font-weight:700; }
  input[type=range] { -webkit-appearance:none; appearance:none; width:80px; height:4px;
    background:rgba(255,255,255,0.18); border-radius:4px; outline:none; cursor:pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
    background:#1fc7d6; cursor:pointer; box-shadow:0 0 8px rgba(31,199,214,0.8); }
  input[type=range]::-moz-range-thumb { width:14px; height:14px; border:none; border-radius:50%;
    background:#1fc7d6; cursor:pointer; box-shadow:0 0 8px rgba(31,199,214,0.8); }
  #stage { flex:1; position:relative; touch-action:none; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }
  canvas:focus { outline:none; }
  #hint { position:absolute; inset:0; display:flex; flex-direction:column; gap:14px; align-items:center;
    justify-content:center; pointer-events:none; transition:opacity 1.2s; text-align:center; padding:20px; }
  #hint .big { font-size:clamp(16px,4vw,28px); letter-spacing:6px; text-transform:uppercase; font-weight:300; opacity:0.55; }
  #hint .small { font-size:clamp(11px,2.4vw,14px); letter-spacing:2px; opacity:0.35; }
  #demoPanel { position:absolute; left:14px; bottom:14px; width:248px; padding:14px;
    background:rgba(16,16,24,0.88); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.1); border-radius:14px; z-index:9; display:none; }
  #demoPanel.show { display:block; }
  #demoTitle { font-size:11px; letter-spacing:2px; text-transform:uppercase; opacity:0.6; margin-bottom:10px; font-weight:700; }
  #songSel { width:100%; margin-bottom:12px; }
  .layerRow { display:flex; align-items:center; gap:8px; margin-bottom:8px; padding:5px 7px; border-radius:8px;
    border:1px solid rgba(255,255,255,0.06); transition:all .15s; }
  .layerRow.live { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.35); box-shadow:0 0 14px rgba(255,255,255,0.12); }
  .dot { width:10px; height:10px; border-radius:50%; flex:0 0 auto; transition:transform .12s; }
  .layerRow.live .dot { transform:scale(1.6); }
  .layerRow select { flex:1; font-size:11px; padding:4px 6px; }
  #demoControls { display:flex; align-items:center; gap:8px; margin-top:6px; }
  #playBtn { flex:1; padding:8px; border-radius:8px; border:none; cursor:pointer; font-weight:700;
    font-size:12px; letter-spacing:1px; background:#e8e8ee; color:#0a0a10; }
  #progWrap { height:4px; background:rgba(255,255,255,0.12); border-radius:4px; margin-top:10px; overflow:hidden; }
  #prog { height:100%; width:0%; background:linear-gradient(90deg,#ffb327,#9d6bff); }
  @media(max-width:680px){ #bar{ gap:8px; padding:8px 10px; } #title{ font-size:12px; letter-spacing:2px; width:100%; text-align:center; margin:0 0 2px; }
    .fam{ padding:6px 10px; font-size:10px; } #demoPanel{ width:210px; } }
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <div id="title">Conductor's Canvas</div>
    <div class="group" id="famGroup"></div>
    <div class="group"><span class="lbl">Inst</span><select id="memberSel"></select></div>
    <div class="group"><span class="lbl">Key</span><select id="rootSel"></select><select id="modeSel"></select></div>
    <div class="group"><button class="ctrl" id="droneBtn">Drone</button></div>
    <div class="group"><span class="lbl">Space</span><input type="range" id="reverb" min="0" max="100" value="28"></div>
    <div class="group"><button class="ctrl demo" id="demoToggle">&#9834; Demo</button></div>
    <div class="group"><button class="ctrl" id="clearBtn">Clear</button></div>
  </div>
  <div id="stage">
    <canvas id="cv" tabindex="0"></canvas>
    <div id="hint">
      <span class="big">Press &amp; drag to conduct</span>
      <span class="small">or play your keyboard &mdash; or hit &#9834; Demo to learn a piece</span>
    </div>
    <div id="demoPanel">
      <div id="demoTitle">Demo</div>
      <select id="songSel"></select>
      <div id="layerRows"></div>
      <div id="demoControls"><button id="playBtn">&#9654; Play</button></div>
      <div id="progWrap"><div id="prog"></div></div>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

  /* ============ Musical data ============ */
  const SCALES = { 'Minor':[0,2,3,5,7,8,10],'Major':[0,2,4,5,7,9,11],'Dorian':[0,2,3,5,7,9,10],'Pentatonic':[0,3,5,7,10],'Lydian':[0,2,4,6,7,9,11] };
  const ROOTS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const FAMILIES = {
    Strings: { color:'#ffb327', members:{
      Violin:{waves:['sawtooth','sawtooth'],detune:[-6,6],attack:0.12,dur:1.0,release:0.5,cutoffBase:2200,cutoffVel:2400,peak:0.12,vibrato:6,register:12},
      Viola:{waves:['sawtooth','sawtooth'],detune:[-6,6],attack:0.13,dur:1.0,release:0.55,cutoffBase:1700,cutoffVel:2200,peak:0.12,vibrato:5,register:5},
      Cello:{waves:['sawtooth','sawtooth'],detune:[-5,5],attack:0.16,dur:1.1,release:0.6,cutoffBase:1250,cutoffVel:2000,peak:0.13,vibrato:4.5,register:-7},
      'Double Bass':{waves:['sawtooth','triangle'],detune:[-4,4],attack:0.2,dur:1.1,release:0.6,cutoffBase:750,cutoffVel:1500,peak:0.14,vibrato:3,register:-19},
      Harp:{waves:['triangle','sine'],detune:[-3,3],attack:0.004,dur:0.95,release:0.5,cutoffBase:2600,cutoffVel:2500,peak:0.16,vibrato:0,register:0,pluck:true},
      Pizzicato:{waves:['triangle','sawtooth'],detune:[-6,6],attack:0.004,dur:0.34,release:0.22,cutoffBase:1900,cutoffVel:3000,peak:0.17,vibrato:0,register:0,pluck:true}
    }},
    Brass: { color:'#1fc7d6', members:{
      Trumpet:{waves:['square','sawtooth'],detune:[-3,4],attack:0.06,dur:0.85,release:0.4,cutoffBase:1700,cutoffVel:4200,peak:0.13,vibrato:3,register:7},
      'French Horn':{waves:['sawtooth','sine'],detune:[-4,4],attack:0.11,dur:0.95,release:0.55,cutoffBase:1050,cutoffVel:3000,peak:0.13,vibrato:2,register:0},
      Trombone:{waves:['sawtooth','sawtooth'],detune:[-4,4],attack:0.08,dur:0.9,release:0.5,cutoffBase:950,cutoffVel:3200,peak:0.14,vibrato:0,register:-7},
      Tuba:{waves:['sawtooth','triangle'],detune:[-3,3],attack:0.12,dur:1.0,release:0.55,cutoffBase:650,cutoffVel:2200,peak:0.15,vibrato:0,register:-19}
    }},
    Woodwinds: { color:'#ff5fa2', members:{
      Flute:{waves:['sine','triangle'],detune:[-2,2],attack:0.08,dur:0.85,release:0.45,cutoffBase:3200,cutoffVel:2000,peak:0.12,vibrato:5,register:12},
      Clarinet:{waves:['square','square'],detune:[-3,3],attack:0.07,dur:0.85,release:0.45,cutoffBase:1800,cutoffVel:2500,peak:0.12,vibrato:3,register:0},
      Oboe:{waves:['sawtooth','sawtooth'],detune:[-3,3],attack:0.07,dur:0.85,release:0.45,cutoffBase:2300,cutoffVel:2600,peak:0.12,vibrato:5,register:5},
      Bassoon:{waves:['sawtooth','triangle'],detune:[-3,3],attack:0.09,dur:0.95,release:0.5,cutoffBase:1150,cutoffVel:2200,peak:0.13,vibrato:3,register:-12}
    }},
    Other: { color:'#9d6bff', members:{
      Choir:{waves:['sine','triangle'],detune:[-5,5],attack:0.3,dur:1.2,release:0.8,cutoffBase:1800,cutoffVel:1500,peak:0.11,vibrato:4,register:0},
      'Warm Pad':{waves:['sawtooth','sawtooth'],detune:[-9,9],attack:0.4,dur:1.4,release:1.0,cutoffBase:1400,cutoffVel:1500,peak:0.10,vibrato:2,register:0},
      Bells:{waves:['sine','sine'],detune:[-1,1],attack:0.004,dur:1.2,release:0.8,cutoffBase:4000,cutoffVel:2000,peak:0.14,vibrato:0,register:12,pluck:true}
    }}
  };

  /* ============ State ============ */
  let currentRoot=0, currentMode='Minor', reverbAmt=0.28;
  let activeFamily='Strings', activeMember='Violin';
  let activeConfig=FAMILIES.Strings.members.Violin, activeColor=FAMILIES.Strings.color;
  function setMember(fam,mem){ activeFamily=fam; activeMember=mem; activeConfig=FAMILIES[fam].members[mem]; activeColor=FAMILIES[fam].color; pointer.color=activeColor; }

  /* ============ Color utils ============ */
  function hexToHSL(hex){ let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
    const mx=Math.max(r,g,b),mn=Math.min(r,g,b); let h,s,l=(mx+mn)/2;
    if(mx===mn){h=s=0;}else{const d=mx-mn; s=l>0.5?d/(2-mx-mn):d/(mx+mn);
      switch(mx){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;}h/=6;} return {h:h*360,s:s*100,l:l*100}; }
  const hslCache={};
  function pitchColor(hex,midi){ const c=hslCache[hex]||(hslCache[hex]=hexToHSL(hex)); const t=clamp((midi-40)/44,0,1);
    const L=clamp(c.l*(0.45+0.85*t),8,76); return 'hsl('+c.h.toFixed(0)+','+c.s.toFixed(0)+'%,'+L.toFixed(0)+'%)'; }

  /* ============ Audio graph ============ */
  let ctx=null,master=null,comp=null,sink=null,dryGain=null,wetGain=null,convolver=null,wetHP=null,wetLP=null,analyser=null,freqData=null,initialized=false;
  function makeImpulse(d,decay){ const rate=ctx.sampleRate,len=Math.floor(rate*d),buf=ctx.createBuffer(2,len,rate);
    for(let ch=0;ch<2;ch++){const a=buf.getChannelData(ch);for(let i=0;i<len;i++)a[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);} return buf; }
  function initAudio(){ if(initialized) return; const AC=window.AudioContext||window.webkitAudioContext; ctx=new AC();
    master=ctx.createGain(); master.gain.value=0.8;
    comp=ctx.createDynamicsCompressor(); comp.threshold.value=-20; comp.ratio.value=4; comp.attack.value=0.004; comp.release.value=0.25;
    sink=ctx.createGain(); sink.gain.value=1; dryGain=ctx.createGain(); wetGain=ctx.createGain();
    convolver=ctx.createConvolver(); convolver.buffer=makeImpulse(1.8,3.4);
    wetHP=ctx.createBiquadFilter(); wetHP.type='highpass'; wetHP.frequency.value=280;
    wetLP=ctx.createBiquadFilter(); wetLP.type='lowpass'; wetLP.frequency.value=5200;
    analyser=ctx.createAnalyser(); analyser.fftSize=512; analyser.smoothingTimeConstant=0.82; freqData=new Uint8Array(analyser.frequencyBinCount);
    master.connect(comp); comp.connect(dryGain); dryGain.connect(sink);
    comp.connect(convolver); convolver.connect(wetHP); wetHP.connect(wetLP); wetLP.connect(wetGain); wetGain.connect(sink);
    sink.connect(ctx.destination); sink.connect(analyser); applyReverb(); initialized=true; }
  function resumeAudio(){ if(ctx&&ctx.state==='suspended') ctx.resume(); }
  function applyReverb(){ if(!initialized) return; dryGain.gain.value=1-0.4*reverbAmt; wetGain.gain.value=0.9*reverbAmt; }
  const midiToFreq=m=>440*Math.pow(2,(m-69)/12);
  function snapBase(nx,ny){ const s=SCALES[currentMode],span=4,oct=Math.min(span-1,Math.floor((1-ny)*span)),base=36+currentRoot+oct*12;
    let deg=clamp(Math.floor(nx*s.length),0,s.length-1); return base+s[deg]; }
  const clampMidi=m=>clamp(m,24,96);

  /* ============ Voices ============ */
  function buildVoice(midi,vel,cfg,startAt){ const now=(startAt!=null)?startAt:ctx.currentTime, freq=midiToFreq(midi);
    const vGain=ctx.createGain(); const filter=ctx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=cfg.cutoffBase+vel*cfg.cutoffVel; filter.Q.value=1.0;
    vGain.connect(filter); filter.connect(master);
    const oscs=cfg.waves.map((w,i)=>{const o=ctx.createOscillator(); o.type=w; o.frequency.value=freq; o.detune.value=cfg.detune[i]||0; o.connect(vGain); return o;});
    let lfo=null,lfoGain=null; if(cfg.vibrato){ lfo=ctx.createOscillator(); lfo.frequency.value=cfg.vibrato; lfoGain=ctx.createGain(); lfoGain.gain.value=freq*0.006;
      lfo.connect(lfoGain); oscs.forEach(o=>lfoGain.connect(o.frequency)); lfo.start(now); }
    return {vGain,filter,oscs,lfo,lfoGain,now}; }
  function cleanupVoice(v){ try{v.vGain.disconnect();v.filter.disconnect();if(v.lfoGain)v.lfoGain.disconnect();}catch(e){} }
  function playGesture(midi,vel){ if(!initialized) return; const cfg=activeConfig,v=buildVoice(midi,vel,cfg),now=v.now,peak=cfg.peak*(0.35+vel*0.65),g=v.vGain.gain;
    g.setValueAtTime(0.0001,now); g.linearRampToValueAtTime(peak,now+cfg.attack);
    if(cfg.pluck){ g.exponentialRampToValueAtTime(0.0001,now+cfg.dur); }
    else { g.linearRampToValueAtTime(peak*0.7,now+cfg.attack+0.15); g.setValueAtTime(peak*0.7,now+cfg.dur); g.exponentialRampToValueAtTime(0.0001,now+cfg.dur+cfg.release); }
    const st=now+cfg.dur+cfg.release+0.1; v.oscs.forEach(o=>{o.start(now);o.stop(st);}); if(v.lfo)v.lfo.stop(st); v.oscs[0].onended=()=>cleanupVoice(v); }
  function noteOn(midi,vel){ if(!initialized) return null; const cfg=activeConfig,v=buildVoice(midi,vel,cfg),now=v.now,peak=cfg.peak*(0.4+vel*0.6),g=v.vGain.gain;
    g.setValueAtTime(0.0001,now); g.linearRampToValueAtTime(peak,now+cfg.attack); v.cfg=cfg; v.released=false;
    if(cfg.pluck){ g.exponentialRampToValueAtTime(0.0001,now+cfg.dur); const st=now+cfg.dur+0.1; v.oscs.forEach(o=>{o.start(now);o.stop(st);}); if(v.lfo)v.lfo.stop(st); v.oscs[0].onended=()=>cleanupVoice(v); }
    else { v.oscs.forEach(o=>o.start(now)); } return v; }
  function noteOff(v){ if(!v||v.released||v.cfg.pluck) return; v.released=true; const now=ctx.currentTime,rel=v.cfg.release,g=v.vGain.gain;
    try{ g.cancelScheduledValues(now); g.setValueAtTime(Math.max(0.0001,g.value),now); g.exponentialRampToValueAtTime(0.0001,now+rel); }catch(e){}
    const st=now+rel+0.1; v.oscs.forEach(o=>{try{o.stop(st);}catch(e){}}); if(v.lfo){try{v.lfo.stop(st);}catch(e){}} v.oscs[0].onended=()=>cleanupVoice(v); }
  function playTimed(midi,vel,cfg,startAt,durSec){ if(!initialized) return; const v=buildVoice(midi,vel,cfg,startAt),peak=cfg.peak*(0.4+vel*0.6),g=v.vGain.gain;
    g.setValueAtTime(0.0001,startAt); g.linearRampToValueAtTime(peak,startAt+cfg.attack);
    if(cfg.pluck){ g.exponentialRampToValueAtTime(0.0001,startAt+Math.max(cfg.dur,durSec)); }
    else { const rel=startAt+Math.max(cfg.attack+0.03,durSec); g.setValueAtTime(peak*0.85,rel); g.exponentialRampToValueAtTime(0.0001,rel+cfg.release); }
    const st=startAt+Math.max(cfg.dur,durSec)+cfg.release+0.15; v.oscs.forEach(o=>{o.start(startAt);o.stop(st);}); if(v.lfo)v.lfo.stop(st); v.oscs[0].onended=()=>cleanupVoice(v); }

  /* ============ Drone ============ */
  let droneNodes=null,droneTimer=null;
  function droneTones(){ const s=SCALES[currentMode]; return [s[0],s[Math.min(2,s.length-1)],s[Math.min(4,s.length-1)],s[Math.min(5,s.length-1)]]; }
  function startDrone(){ if(!initialized||droneNodes) return; const now=ctx.currentTime; const g=ctx.createGain(); g.gain.value=0.0001; g.connect(master);
    function mk(midi,level){ const o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.value=midiToFreq(midi);
      const lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=520; lp.Q.value=0.6; const vg=ctx.createGain(); vg.gain.value=level;
      o.connect(lp); lp.connect(vg); vg.connect(g); o.start(now); return {o,lp,vg}; }
    const rootMidi=36+currentRoot, voices=[mk(rootMidi,0.8),mk(rootMidi+12,0.5),mk(rootMidi+19,0.35)];
    g.gain.exponentialRampToValueAtTime(0.08,now+3); droneNodes={g,voices}; scheduleEvolve(); }
  function scheduleEvolve(){ const evolve=()=>{ if(!droneNodes) return; const tones=droneTones(),now=ctx.currentTime,rootMidi=36+currentRoot;
      const t1=rootMidi+12+tones[1+Math.floor(Math.random()*2)], t2=rootMidi+19+tones[Math.floor(Math.random()*tones.length)];
      droneNodes.voices[1].o.frequency.linearRampToValueAtTime(midiToFreq(t1),now+3.5); droneNodes.voices[2].o.frequency.linearRampToValueAtTime(midiToFreq(t2),now+4.0);
      droneNodes.g.gain.cancelScheduledValues(now); droneNodes.g.gain.setValueAtTime(Math.max(0.0001,droneNodes.g.gain.value),now);
      droneNodes.g.gain.linearRampToValueAtTime(0.055+Math.random()*0.04,now+3); droneTimer=setTimeout(evolve,5000+Math.random()*4000); };
    droneTimer=setTimeout(evolve,4000+Math.random()*3000); }
  function stopDrone(){ if(!droneNodes) return; if(droneTimer){clearTimeout(droneTimer);droneTimer=null;} const {g,voices}=droneNodes,t=ctx.currentTime;
    g.gain.cancelScheduledValues(t); g.gain.setValueAtTime(Math.max(0.0001,g.gain.value),t); g.gain.exponentialRampToValueAtTime(0.0001,t+1.5);
    voices.forEach(v=>{try{v.o.stop(t+1.7);}catch(e){}}); droneNodes=null; }
  function updateDroneKey(){ if(!droneNodes) return; const now=ctx.currentTime,rootMidi=36+currentRoot,targets=[rootMidi,rootMidi+12,rootMidi+19];
    droneNodes.voices.forEach((v,i)=>v.o.frequency.linearRampToValueAtTime(midiToFreq(targets[i]),now+1.5)); }
  function clearSound(){ if(!initialized) return; const d=1.2,rate=ctx.sampleRate,buf=ctx.createBuffer(1,Math.floor(rate*d),rate),a=buf.getChannelData(0);
    for(let i=0;i<a.length;i++)a[i]=(Math.random()*2-1)*Math.pow(1-i/a.length,2.6);
    const src=ctx.createBufferSource(); src.buffer=buf; const hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=3800;
    const g=ctx.createGain(); g.gain.value=0.2; src.connect(hp); hp.connect(g); g.connect(master); src.start(); }

  /* ============ Song library ============ */
  // Pachelbel (hand-built 4-voice canon)
  const BASS=[50,45,47,42,43,38,43,45];
  const PV1=[[0,78,2],[2,76,2],[4,74,2],[6,73,2],[8,71,2],[10,69,2],[12,71,2],[14,73,2]];
  const PV2=[[0,81,1],[1,78,1],[2,76,1],[3,73,1],[4,74,1],[5,71,1],[6,73,1],[7,69,1],[8,71,1],[9,67,1],[10,69,1],[11,66,1],[12,67,1],[13,71,1],[14,69,1],[15,73,1]];

  const famGroup=document.getElementById('famGroup'),memberSel=document.getElementById('memberSel');
  function repopulateMembers(fam){ memberSel.innerHTML=''; Object.keys(FAMILIES[fam].members).forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;memberSel.appendChild(o);}); memberSel.value=activeMember; }
  Object.keys(FAMILIES).forEach(fam=>{ const b=document.createElement('button'); b.className='fam'+(fam===activeFamily?' active':''); b.textContent=fam; b.dataset.f=fam;
    if(fam===activeFamily) b.style.background=FAMILIES[fam].color;
    b.addEventListener('click',()=>{ const first=Object.keys(FAMILIES[fam].members)[0]; setMember(fam,first);
      [...famGroup.children].forEach(ch=>{const on=ch.dataset.f===fam; ch.classList.toggle('active',on); ch.style.background=on?FAMILIES[ch.dataset.f].color:'rgba(255,255,255,0.02)';}); repopulateMembers(fam); });
    famGroup.appendChild(b); });
  repopulateMembers(activeFamily); memberSel.addEventListener('change',()=>setMember(activeFamily,memberSel.value));
  const rootSel=document.getElementById('rootSel'); ROOTS.forEach((r,i)=>{const o=document.createElement('option');o.value=i;o.textContent=r;rootSel.appendChild(o);}); rootSel.value=currentRoot;
  rootSel.addEventListener('change',()=>{currentRoot=parseInt(rootSel.value,10); updateDroneKey();});
  const modeSel=document.getElementById('modeSel'); Object.keys(SCALES).forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;modeSel.appendChild(o);}); modeSel.value=currentMode;
  modeSel.addEventListener('change',()=>{currentMode=modeSel.value;});
  const droneBtn=document.getElementById('droneBtn'); droneBtn.addEventListener('click',()=>{ initAudio(); resumeAudio(); if(droneNodes){stopDrone();droneBtn.classList.remove('on');}else{startDrone();droneBtn.classList.add('on');} });
  const reverbEl=document.getElementById('reverb'); reverbEl.addEventListener('input',()=>{reverbAmt=parseInt(reverbEl.value,10)/100; applyReverb();});
  document.getElementById('clearBtn').addEventListener('click',()=>{ initAudio(); resumeAudio(); notes=[]; particles=[]; ribbon=[]; clearSound(); });

  /* demo panel */
  const demoPanel=document.getElementById('demoPanel'),demoTitle=document.getElementById('demoTitle'),layerRows=document.getElementById('layerRows'),
        playBtn=document.getElementById('playBtn'),prog=document.getElementById('prog'),songSel=document.getElementById('songSel');
  function instOptions(sel,fam,mem){ sel.innerHTML=''; Object.keys(FAMILIES).forEach(f=>{ const og=document.createElement('optgroup'); og.label=f;
    Object.keys(FAMILIES[f].members).forEach(m=>{ const o=document.createElement('option'); o.value=f+'|'+m; o.textContent=m; if(f===fam&&m===mem)o.selected=true; og.appendChild(o); }); sel.appendChild(og); }); }
  let layerRowEls=[];
  function buildPanelRows(){ layerRows.innerHTML=''; layerRowEls=[];
    demo.order.forEach(L=>{ const row=document.createElement('div'); row.className='layerRow'; row.dataset.l=L;
      const dot=document.createElement('span'); dot.className='dot'; dot.style.background=FAMILIES[demo.layers[L].fam].color; row.appendChild(dot);
      const sel=document.createElement('select'); instOptions(sel,demo.layers[L].fam,demo.layers[L].mem);
      sel.addEventListener('change',()=>{ const parts=sel.value.split('|'); demo.layers[L]={fam:parts[0],mem:parts[1]}; dot.style.background=FAMILIES[parts[0]].color; });
      row.appendChild(sel); layerRows.appendChild(row); layerRowEls.push(row); }); }
  Object.keys(SONGS).forEach(k=>{ const o=document.createElement('option'); o.value=k; o.textContent=SONGS[k].name; songSel.appendChild(o); });
  songSel.value='pachelbel'; songSel.addEventListener('change',()=>selectSong(songSel.value));
  document.getElementById('demoToggle').addEventListener('click',()=>{ demoPanel.classList.toggle('show'); });
  playBtn.addEventListener('click',()=>{ if(demo.playing) stopDemo(); else startDemo(); });
  selectSong('pachelbel');

  function refocus(){ setTimeout(()=>{try{cv.focus();}catch(_){ }},0); }
  document.getElementById('bar').addEventListener('change',refocus);
  document.getElementById('bar').addEventListener('click',e=>{ if((e.target.tagName||'')==='BUTTON') refocus(); });

  /* ============ Boot ============ */
  resize(); requestAnimationFrame(loop); try{cv.focus();}catch(_){ }
})();
</script>
</body>
</html>
